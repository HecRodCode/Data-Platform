worker:
    image: apache/airflow:3.2.0
    command: celery worker
    env_file: ../.env
    user: "${AIRFLOW_UID:-1000}:0"
    volumes:
      - ../airflow/dags:/opt/airflow/dags
      - ../airflow/logs:/opt/airflow/logs
      - ../airflow/plugins:/opt/airflow/plugins
    restart: unless-stopped
    environment:
      - AIRFLOW__CELERY__WORKER_CONCURRENCY=2
      - AIRFLOW__CORE__DAG_FILE_PROCESSOR_TIMEOUT=30
    deploy:
      resources:
        limits:
          memory: 1000M
          cpus: '0.75'
        reservations:
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "celery --app airflow.providers.celery.executors.celery_executor.app inspect ping -d celery@$${HOSTNAME}"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s