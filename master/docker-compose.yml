version: "3.8"

x-airflow-common: &airflow-common
  image: apache/airflow:2.9.2
  env_file: ../.env
  user: "${AIRFLOW_UID:-1000}:0"
  volumes:
    - ../airflow/dags:/opt/airflow/dags
    - ../airflow/logs:/opt/airflow/logs
    - ../airflow/plugins:/opt/airflow/plugins
  depends_on:
    postgres:
      condition: service_healthy
    rabbitmq:
      condition: service_healthy
  restart: unless-stopped

services:
  postgres:
    image: postgres:15
    env_file: ../.env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}"]
      interval: 10s
      retries: 5
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3.12-management
    env_file: ../.env
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      retries: 5
    restart: unless-stopped

  airflow-init:
    <<: *airflow-common
    command: >
      bash -c "airflow db migrate &&
               airflow users create
               --username admin
               --firstname Admin
               --lastname User
               --role Admin
               --email admin@example.com
               --password admin"
    restart: "no"

  scheduler:
    <<: *airflow-common
    command: scheduler

  webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      retries: 5

volumes:
  postgres_data: