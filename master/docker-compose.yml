x-airflow-common: &airflow-common
  image: apache/airflow:3.2.0
  env_file: .env
  user: "${AIRFLOW_UID:-1000}:0"
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: "${AIRFLOW__CORE__EXECUTOR}"
    AIRFLOW__CORE__FERNET_KEY: "${AIRFLOW__CORE__FERNET_KEY}"
    AIRFLOW__CORE__LOAD_EXAMPLES: "${AIRFLOW__CORE__LOAD_EXAMPLES}"
    AIRFLOW__CORE__HOSTNAME_CALLABLE: "socket.gethostname"
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: "${AIRFLOW__DATABASE__SQL_ALCHEMY_CONN}"
    AIRFLOW__CELERY__BROKER_URL: "${AIRFLOW__CELERY__BROKER_URL}"
    AIRFLOW__CELERY__RESULT_BACKEND: "${AIRFLOW__CELERY__RESULT_BACKEND}"
    AIRFLOW__CELERY__WORKER_CONCURRENCY: "${AIRFLOW__CELERY__WORKER_CONCURRENCY}"
    AIRFLOW__API__SECRET_KEY: "${AIRFLOW__API__SECRET_KEY}"
    AIRFLOW__API__AUTH_STRATEGIES: "${AIRFLOW__API__AUTH_STRATEGIES}"
    AIRFLOW__SIMPLE_AUTH_MANAGER__USERNAME: "${AIRFLOW__SIMPLE_AUTH_MANAGER__USERNAME}"
    AIRFLOW__SIMPLE_AUTH_MANAGER__PASSWORD: "${AIRFLOW__SIMPLE_AUTH_MANAGER__PASSWORD}"
  volumes:
    - ../airflow/dags:/opt/airflow/dags
    - ../airflow/logs:/opt/airflow/logs
    - ../airflow/plugins:/opt/airflow/plugins
  depends_on:
    postgres:
      condition: service_healthy
    rabbitmq:
      condition: service_healthy
  restart: unless-stopped

services:
  postgres:
    image: postgres:15
    env_file: .env
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-xxxxxx}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-xxxxxx}"
      POSTGRES_DB: "${POSTGRES_DB:-xxxxxx}"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-xxxxxx}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3.12-management
    env_file: .env
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  airflow-init:
    <<: *airflow-common
    environment:
      <<: *airflow-common-env
    command: bash -c "airflow db migrate"
    restart: "no"

  scheduler:
    <<: *airflow-common
    environment:
      <<: *airflow-common-env
    command: scheduler
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type SchedulerJob --hostname \"$$(hostname)\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  dag-processor:
    <<: *airflow-common
    environment:
      <<: *airflow-common-env
    command: dag-processor
    restart: always

  triggerer:
    <<: *airflow-common
    environment:
      <<: *airflow-common-env
    command: triggerer
    restart: always

  api-server:
    <<: *airflow-common
    environment:
      <<: *airflow-common-env
    command: api-server
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  postgres_data: